version: '3.8'

services:
  bot:
    platform: linux/amd64
    build: .
    container_name: ai_content_bot
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  db:
    platform: linux/amd64
    image: postgres:16
    container_name: ai_content_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: ai_content_bot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_content_bot"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
